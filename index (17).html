<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#FAF6EF" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Coordenação EAC</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,500;1,9..144,700&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Fraunces', 'Georgia', 'serif'],
            body: ['Geist', 'system-ui', 'sans-serif'],
          },
          colors: {
            cream: '#FAF6EF',
            paper: '#FFFFFF',
            ink: '#1A1614',
            muted: '#7A736D',
            border: '#E7E0D4',
            brand: '#B8441F',
            verde: '#16794A',
            amarelo: '#C77B00',
            vermelho: '#C4341C',
            'verde-bg': '#E3F1E8',
            'amarelo-bg': '#FBEFD5',
            'vermelho-bg': '#FBE4DF',
          },
          boxShadow: {
            card: '0 1px 2px rgba(26,22,20,0.04), 0 8px 24px -12px rgba(26,22,20,0.12)',
            sheet: '0 -4px 32px rgba(26,22,20,0.14)',
            fab: '0 4px 16px rgba(184,68,31,0.35), 0 2px 4px rgba(26,22,20,0.1)',
          },
        },
      },
    };
  </script>

  <style>
    :root { color-scheme: light; }
    html, body { overscroll-behavior-y: none; }
    body {
      font-family: 'Geist', system-ui, sans-serif;
      background-color: #FAF6EF;
      background-image:
        radial-gradient(1200px 600px at 10% -10%, rgba(184,68,31,0.06), transparent 60%),
        radial-gradient(900px 500px at 110% 10%, rgba(22,121,74,0.05), transparent 60%);
      color: #1A1614;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    .font-display { font-family: 'Fraunces', Georgia, serif; font-optical-sizing: auto; }
    button, [role="button"], a { -webkit-tap-highlight-color: transparent; }
    input, textarea, select { font-family: inherit; outline: none; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }

    .safe-bottom { padding-bottom: max(env(safe-area-inset-bottom), 1rem); }
    .safe-top { padding-top: max(env(safe-area-inset-top), 0.5rem); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pulseBorder { 0%,100% { box-shadow: 0 0 0 0 rgba(196,52,28,0.35); } 50% { box-shadow: 0 0 0 6px rgba(196,52,28,0); } }
    .anim-fade-up { animation: fadeUp 0.45s cubic-bezier(.2,.8,.2,1) both; }
    .anim-scale-in { animation: scaleIn 0.25s ease-out both; }
    .anim-slide-up { animation: slideUp 0.32s cubic-bezier(.2,.8,.2,1) both; }
    .anim-fade-in { animation: fadeIn 0.2s ease both; }
    .pulse-red { animation: pulseBorder 2s ease-in-out infinite; }

    .dot { animation: dotPulse 1.3s infinite ease-in-out; }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes dotPulse { 0%, 70%, 100% { opacity: 0.25; transform: scale(0.85); } 35% { opacity: 1; transform: scale(1); } }

    /* Scrollbar leve */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: #D8D0C1; border-radius: 999px; }

    /* PIN dots input */
    .pin-box {
      width: 54px; height: 64px;
      border-radius: 14px;
      background: #fff;
      border: 1.5px solid #E7E0D4;
      font-family: 'Fraunces', serif;
      font-size: 28px;
      font-weight: 600;
      text-align: center;
      transition: all 0.15s ease;
    }
    .pin-box:focus { border-color: #1A1614; box-shadow: 0 0 0 4px rgba(26,22,20,0.08); }

    /* Vote option card */
    .vote-option {
      transition: all 0.18s cubic-bezier(.2,.8,.2,1);
    }
    .vote-option:active { transform: scale(0.985); }

    /* Avatar stack */
    .avatar {
      width: 28px; height: 28px;
      border-radius: 999px;
      display: inline-flex; align-items: center; justify-content: center;
      font-family: 'Geist', sans-serif;
      font-size: 11px; font-weight: 600;
      border: 2px solid #FAF6EF;
      letter-spacing: -0.02em;
    }

    /* Urgency tag paper-like texture feel */
    .urgency-tag {
      font-feature-settings: "ss01" on, "ss02" on;
      letter-spacing: 0.02em;
    }

    /* Hide on desktop */
    @media (min-width: 768px) {
      .mobile-only { display: none; }
    }
  </style>
</head>
<body class="min-h-screen">

  <!-- LOADING -->
  <div id="loading-screen" class="min-h-screen flex items-center justify-center">
    <div class="flex items-center gap-2">
      <span class="dot w-2.5 h-2.5 rounded-full bg-ink"></span>
      <span class="dot w-2.5 h-2.5 rounded-full bg-ink"></span>
      <span class="dot w-2.5 h-2.5 rounded-full bg-ink"></span>
    </div>
  </div>

  <!-- LOGIN -->
  <section id="login-screen" class="hidden min-h-screen flex flex-col safe-top">
    <div class="flex-1 flex flex-col items-center justify-center px-6 py-10 max-w-md mx-auto w-full">
      <div class="w-full anim-fade-up">
        <div class="mb-10 text-center">
          <div class="inline-flex items-center gap-2 text-xs font-medium text-muted uppercase tracking-[0.2em] mb-4">
            <span class="w-6 h-px bg-muted"></span>
            Coordenação
            <span class="w-6 h-px bg-muted"></span>
          </div>
          <h1 class="font-display text-5xl font-600 leading-[0.95] tracking-tight">
            <span class="italic text-brand">EAC</span><br/>em ordem.
          </h1>
          <p class="mt-4 text-muted text-sm leading-relaxed max-w-[260px] mx-auto">
            As demandas da coordenação, sem perder nada no meio da conversa.
          </p>
        </div>

        <div id="login-step-name">
          <p class="text-xs font-semibold text-muted uppercase tracking-widest mb-3">Quem é você?</p>
          <div id="users-grid" class="grid grid-cols-2 gap-2.5"></div>
        </div>

        <div id="login-step-pin" class="hidden">
          <button id="back-to-names" class="flex items-center gap-1.5 text-sm text-muted mb-6 hover:text-ink transition-colors">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            voltar
          </button>
          <p class="text-xs font-semibold text-muted uppercase tracking-widest mb-1">Olá</p>
          <h2 id="selected-name" class="font-display text-3xl font-600 mb-6"></h2>
          <p id="pin-label" class="text-sm text-ink mb-4">Digite seu PIN de 4 dígitos</p>
          <div class="flex gap-2.5 justify-center mb-2">
            <input class="pin-box" type="tel" maxlength="1" inputmode="numeric" pattern="[0-9]" data-pin="0" />
            <input class="pin-box" type="tel" maxlength="1" inputmode="numeric" pattern="[0-9]" data-pin="1" />
            <input class="pin-box" type="tel" maxlength="1" inputmode="numeric" pattern="[0-9]" data-pin="2" />
            <input class="pin-box" type="tel" maxlength="1" inputmode="numeric" pattern="[0-9]" data-pin="3" />
          </div>
          <p id="pin-hint" class="text-center text-xs text-muted min-h-[16px]"></p>
          <button id="pin-submit" class="mt-6 w-full bg-ink text-cream font-medium py-4 rounded-2xl text-sm tracking-wide disabled:opacity-40 disabled:cursor-not-allowed transition-all active:scale-[0.99]" disabled>
            Entrar
          </button>
        </div>
      </div>
    </div>
    <footer class="text-center text-xs text-muted pb-6">feito com carinho · <span id="year"></span></footer>
  </section>

  <!-- APP -->
  <section id="app-screen" class="hidden min-h-screen">
    <!-- Top bar -->
    <header class="sticky top-0 z-30 bg-cream/85 backdrop-blur-md border-b border-border safe-top">
      <div class="max-w-2xl mx-auto px-5 py-3.5 flex items-center justify-between">
        <div>
          <p class="text-[10px] font-semibold text-muted uppercase tracking-[0.18em]">Coordenação</p>
          <h1 class="font-display text-xl font-600 leading-tight"><span class="italic text-brand">EAC</span> em ordem</h1>
        </div>
        <div class="flex items-center gap-2">
          <button id="filter-toggle" class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-border/50 transition-colors" title="Filtrar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M7 12h10M10 18h4"/></svg>
          </button>
          <button id="user-menu-btn" class="flex items-center" title="Sair">
            <span id="user-avatar" class="avatar !w-10 !h-10 !text-sm !border-0"></span>
          </button>
        </div>
      </div>
      <div id="filter-bar" class="hidden border-t border-border">
        <div class="max-w-2xl mx-auto px-5 py-2.5 flex gap-2 overflow-x-auto">
          <button data-filter="todas" class="filter-chip">Todas</button>
          <button data-filter="aguardam" class="filter-chip">Aguardam meu voto</button>
          <button data-filter="minhas" class="filter-chip">Minhas</button>
          <button data-filter="encerradas" class="filter-chip">Encerradas</button>
        </div>
      </div>
    </header>

    <!-- Feed -->
    <main class="max-w-2xl mx-auto px-4 py-5 pb-32">
      <div id="status-banner" class="hidden mb-5"></div>
      <div id="feed" class="space-y-3"></div>
      <div id="feed-empty" class="hidden text-center py-20">
        <div class="inline-block p-4 rounded-full bg-paper border border-border mb-4">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#7A736D" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z"/></svg>
        </div>
        <p class="font-display text-xl font-600">Nada por aqui.</p>
        <p class="text-sm text-muted mt-1">Quando alguém cadastrar uma demanda, aparece.</p>
      </div>
    </main>

    <!-- FAB -->
    <button id="new-demand-btn" class="fixed right-5 z-20 bg-brand text-cream w-14 h-14 rounded-full shadow-fab flex items-center justify-center active:scale-95 transition-transform" style="bottom: calc(1.5rem + env(safe-area-inset-bottom, 0px))" title="Nova demanda">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </section>

  <!-- MODAL: backdrop + container -->
  <div id="modal-root" class="fixed inset-0 z-50 hidden"></div>

  <!-- TOAST -->
  <div id="toast" class="fixed left-1/2 -translate-x-1/2 bottom-24 z-[60] bg-ink text-cream px-4 py-2.5 rounded-full text-sm font-medium shadow-lg opacity-0 transition-all pointer-events-none"></div>

  <style>
    .filter-chip {
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      color: #7A736D;
      background: transparent;
      border: 1px solid transparent;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .filter-chip:hover { color: #1A1614; }
    .filter-chip.active { background: #1A1614; color: #FAF6EF; }

    .user-pill {
      padding: 14px 12px;
      background: #fff;
      border: 1.5px solid #E7E0D4;
      border-radius: 16px;
      text-align: left;
      transition: all 0.15s cubic-bezier(.2,.8,.2,1);
      display: flex; align-items: center; gap: 10px;
    }
    .user-pill:hover { border-color: #1A1614; transform: translateY(-1px); }
    .user-pill:active { transform: translateY(0); }
    .user-pill .avatar { flex-shrink: 0; }
    .user-pill .role-tag {
      font-size: 10px;
      color: #7A736D;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
  </style>

  <script type="module" src="./firebase-config.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
